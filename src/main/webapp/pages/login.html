<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
    <title>Finance Tracker - Login</title>
    <link rel="stylesheet" href="/PersonalFinanceTracker/css/style.css">
    </head>
<body class="center-page">
<div class="login-container">
    <h2>Personal Finance Tracker</h2>
    <form id="loginForm">
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account?
        <a href="/PersonalFinanceTracker/pages/register.html">Register</a>
    </p>
</div>
<script src="/PersonalFinanceTracker/js/script.js"></script>
</body>
</html>
