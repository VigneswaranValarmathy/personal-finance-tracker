<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finance Tracker - Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="nav">
    <div class="nav-left">
        <h2>Finance Tracker</h2>
    </div>

    <div class="nav-right">
        <a href="dashboard.html">Dashboard</a>
        <a href="add-transaction.html">Add Transaction</a>
        <div class="profile-container">
        <img src="" alt="profile" class="profile-icon" onclick="toggleProfileMenu()">
        <div id="profileMenu" class="profile-menu">
        	<p id="userEmail"></p>
        	<button onclick="logout()">Logout</button>
        </div>
   		</div>
    </div>
</div>
<div class="dashboard-container">     
        <h1>Finance Dashboard</h1>
        <div class="summary">
            <div class="card">
                <h3>Total Income</h3>
                <p id="totalIncome">$0</p>
            </div>
            <div class="card">
                <h3>Total Expense</h3>
                <p id="totalExpense">$0</p>
            </div>
            <div class="card">
                <h3>Savings</h3>
                <p id="savings">$0</p>
            </div>
        </div>
        <h2>Expense Chart</h2>
        <canvas id="expenseChart" width="400" height="100"></canvas>
       <h2>Budget Alert</h2>

<div class="budget-box">

<label>Food Budget</label>
<input type="number" id="foodBudget" placeholder="Enter Food Budget">

<button onclick="saveBudget()">Save Budget</button>

<p id="budgetAlert"></p>

</div>

<h2>Transaction History</h2>

<table id="transactionTable" border="1">

<thead>
<tr>
<th>Date</th>
<th>Category</th>
<th>Type</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody id="transactionBody">

</tbody>

</table> 
        <div class="actions">
            <a href="add-transaction.html">
                <button>Add Transaction</button>
            </a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/script.js"></script>
</body>

</html>
